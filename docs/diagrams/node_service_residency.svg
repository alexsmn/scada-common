ent0004"><rect fill="#F1F1F1" height="52.9766" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="171.9834" x="836.7" y="141.49"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="139.1934" x="846.7" y="165.0252">Pending fetch queue</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="151.9834" x="846.7" y="181.5134">(channel not open yet)</text></g><!--entity parent--><g class="entity" data-qualified-name="pins.parent" data-source-line="11" id="ent0005"><rect fill="#F1F1F1" height="52.9766" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="236.0498" x="1043.67" y="141.49"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="89.6807" x="1053.67" y="165.0252">Parent model</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="216.0498" x="1053.67" y="181.5134">child_models_ (fetched subtree)</text></g><!--entity lru--><g class="entity" data-qualified-name="pins.lru" data-source-line="12" id="ent0006"><rect fill="#F1F1F1" height="52.9766" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="256.0928" x="1314.65" y="141.49"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="163.7139" x="1324.65" y="165.0252">Keep-alive MRU window</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="236.0928" x="1324.65" y="181.5134">(keep_alive_capacity_, default 256)</text></g><!--entity service--><g class="entity" data-qualified-name="service" data-source-line="15" id="ent0007"><rect fill="#F1F1F1" height="36.4883" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="157.8057" x="739.79" y="7"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="137.8057" x="749.79" y="30.5352">v3::NodeServiceImpl</text></g><!--entity registry--><g class="entity" data-qualified-name="registry" data-source-line="16" id="ent0008"><rect fill="#EEEEEE" height="52.9766" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="190.4063" x="99.49" y="141.49"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="131.7148" x="109.49" y="165.0252">NodeModelRegistry</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="170.4063" x="109.49" y="181.5134">map&lt;NodeId, weak_ptr&gt;</text></g><!--entity model--><g class="entity" data-qualified-name="model" data-source-line="17" id="ent0009"><rect fill="#F1F1F1" height="36.4883" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="151.79" x="702.8" y="298.19"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="131.79" x="712.8" y="321.7252">v3::NodeModelImpl</text></g><g class="entity" data-qualified-name="GMN19" data-source-line="30" id="ent0020"><path d="M6,288.47 L6,344.4016 A0,0 0 0 0 6,344.4016 L325.3906,344.4016 A0,0 0 0 0 325.3906,344.4016 L325.3906,298.47 L315.3906,288.47 L175.11,288.47 L189.58,194.82 L167.11,288.47 L6,288.47 A0,0 0 0 0 6,288.47" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M315.3906,288.47 L315.3906,298.47 L325.3906,298.47 L315.3906,288.47" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="298.3906" x="12" y="306.0384">GetNodeModel(id): lock or create + touch MRU.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="293.7568" x="12" y="321.3489">FindNodeModel(id): lookup only &#8212; update and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="282.0518" x="12" y="336.6595">notification paths must never create models.</text></g><g class="entity" data-qualified-name="GMN22" data-source-line="36" id="ent0023"><path d="M635.94,405.4 L635.94,491.9527 A0,0 0 0 0 635.94,491.9527 L921.4532,491.9527 A0,0 0 0 0 921.4532,491.9527 L921.4532,415.4 L911.4532,405.4 L782.7,405.4 L778.7,335 L774.7,405.4 L635.94,405.4 A0,0 0 0 0 635.94,405.4" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M911.4532,405.4 L911.4532,415.4 L921.4532,415.4 L911.4532,405.4" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="263.853" x="641.94" y="422.9684">Dropping the last pin destroys the model;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.9409" x="641.94" y="438.2789">a parent's destruction unwinds its whole</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="252.897" x="641.94" y="453.5895">fetched subtree. NodeDeleted drops the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="264.5132" x="641.94" y="468.9">keep-alive pin and tombstones the model</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="141.2417" x="641.94" y="484.2105">for remaining holders.</text></g><!--link consumers to model--><g class="link" data-entity-1="ent0002" data-entity-2="ent0009" data-link-type="dependency" data-source-line="19" id="lnk10"><path d="M471.05,194.96 C486.44,204.18 503.27,215.1 517.7,226.47 C533.5,238.91 532.19,248.57 549.7,258.47 C596.68,285.03 651.0261,298.5299 697.4961,306.1599" fill="none" id="consumers-to-model" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="702.43,306.97,694.197,301.5646,697.4961,306.1599,692.9008,309.4589,702.43,306.97" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacin